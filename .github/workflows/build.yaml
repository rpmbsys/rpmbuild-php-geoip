name: RPM build
on:
  push:
  workflow_dispatch:
    inputs:
      php:
        description: 'PHP minor to build: all | 8.2 | 8.3 | 8.4 | 8.5'
        default: all
        type: string
env:
  ARTIFACTORY_URL: https://rpmb.jfrog.io
  BINTRAY_USER: ${{ secrets.BINTRAY_USER }}
  BINTRAY_API_KEY: ${{ secrets.BINTRAY_API_KEY }}
  DOCKER_USER: ${{ secrets.DOCKER_USER }}
  DOCKER_PASS: ${{ secrets.DOCKER_PASS }}
  RL9: 9.8.20260525.0
  RL9TAG: 9.8.20260525.0
  RL10: 10.2.20260525.0
  RL10TAG: 10.2.20260525.0
jobs:
  # Emit the build matrix, optionally filtered to a single PHP minor when this
  # run was dispatched with the `php` input (the family orchestrator does this).
  # A normal push leaves `php` unset -> builds every supported minor.
  setup:
    runs-on: ubuntu-latest
    outputs:
      test: ${{ steps.matrix.outputs.test }}
    steps:
      - uses: actions/checkout@v3
      - id: matrix
        run: python3 .github/scripts/php-matrix.py "${{ github.event.inputs.php || 'all' }}"
  test:
    needs: setup
    runs-on: ubuntu-latest
    if: ${{ ! startsWith(github.ref_name, 'skip-rpm-') }}
    strategy:
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.test) }}
    env:
      BUILD_COMPOSE_FILE: ${{ matrix.compose-file }}
      BINTRAY_REPO: ${{ matrix.repo }}
      BUILD: ${{ matrix.build }}
      UPLOADER: ${{ matrix.uploader }}
      REPO_PATH: ${{ matrix.repo_path }}
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
      - run: docker compose -f $BUILD_COMPOSE_FILE build --no-cache $BUILD
      - run: docker compose -f $BUILD_COMPOSE_FILE up --exit-code-from $BUILD $BUILD
      - run: docker compose -f rpmbuild/docker-compose.yml pull $UPLOADER
      - run: docker compose -f rpmbuild/docker-compose.yml run --rm -e BINTRAY_USER=$BINTRAY_USER -e BINTRAY_API_KEY=$BINTRAY_API_KEY -e BINTRAY_REPO=$BINTRAY_REPO -e ARTIFACTORY_URL=$ARTIFACTORY_URL -e REPO_PATH=$REPO_PATH $UPLOADER
